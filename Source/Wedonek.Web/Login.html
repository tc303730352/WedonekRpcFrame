<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <!-- Meta, title, CSS, favicons, etc. -->
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Wedonek微服务登陆 </title>

    <!-- Bootstrap -->
    <link href="/vendors/bootstrap/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="/vendors/font-awesome/css/font-awesome.min.css" rel="stylesheet">
    <!-- NProgress -->
    <link href="/vendors/nprogress/nprogress.css" rel="stylesheet">
    <!-- Animate.css -->
    <link href="/vendors/animate.css/animate.min.css" rel="stylesheet">

    <!-- Custom Theme Style -->
    <link href="/build/css/custom.min.css" rel="stylesheet">
</head>
<body class="login">
    <div>
        <div class="login_wrapper">
            <div class="animate form login_form">
                <section class="login_content">
                    <form id="LoginForm">
                        <h1>微服务管理系统登陆</h1>
                        <div>
                            <input type="text" class="form-control" name="LoginName" placeholder="登陆名" required="" />
                        </div>
                        <div>
                            <input type="password" class="form-control" name="Pwd" placeholder="登陆密码" required="" />
                        </div>
                        <div>
                            <button type="button" id="AdminLogin" class="btn btn-success btn-lg">登  陆</button>
                        </div>
                    </form>
                </section>
            </div>
        </div>
    </div>
    <!-- jQuery -->
    <script type="text/javascript" src="/vendors/jquery/jquery-3.6.0.min.js"></script>
    <script type="text/javascript" src="/vendors/jquery/jquery.cookie.min.js"></script>
    <script type="text/javascript" src="/vendors/pnotify/dist/pnotify.js"></script>
    <script type="text/javascript" src="/js/PublicJs.js"></script>
    <script type="text/javascript" src="/js/AdminLogin.js"></script>
</body>
</html>
